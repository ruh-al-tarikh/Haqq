<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="HAQ">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ page.thumbnail | default: '/assets/img/og-image.jpg' | absolute_url }}">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="{{ page.url | absolute_url }}">
  <meta property="twitter:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="twitter:description" content="{{ page.description | default: site.description }}">
  <meta property="twitter:image" content="{{ page.thumbnail | default: '/assets/img/og-image.jpg' | absolute_url }}">

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="dns-prefetch" href="https://www.youtube.com">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  {% include header.html %}

  <main id="main-content" class="content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Mobile menu logic
      const hamburger = document.getElementById('hamburger');
      const navLinks = document.getElementById('nav-links');

      if (hamburger && navLinks) {
        hamburger.addEventListener('click', () => {
          const isExpanded = hamburger.getAttribute('aria-expanded') === 'true';
          hamburger.setAttribute('aria-expanded', !isExpanded);
          navLinks.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
          if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
            hamburger.setAttribute('aria-expanded', 'false');
            navLinks.classList.remove('show');
          }
        });
      }

      // Episode Search logic
      const searchInput = document.getElementById('episode-search');
      const episodeGrid = document.getElementById('episode-grid');
      const searchStatus = document.getElementById('search-status');

      if (searchInput && episodeGrid) {
        const episodes = Array.from(episodeGrid.querySelectorAll('.episode-card'));

        searchInput.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase().trim();
          let visibleCount = 0;

          episodes.forEach(card => {
            const title = card.querySelector('.episode-title').textContent.toLowerCase();
            if (title.includes(query)) {
              card.style.display = '';
              visibleCount++;
            } else {
              card.style.display = 'none';
            }
          });

          if (searchStatus) {
            searchStatus.textContent = `Showing ${visibleCount} results for "${query}"`;
          }
        });
      }
    });
  </script>
</body>
</html>
